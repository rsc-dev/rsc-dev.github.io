<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · segfault — matusiak.me</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
  :root{
    --bg:#0a0a0b; --text:#e8e0cc; --gold:#d4af37; --brass:#7d7458; --dim:#4a4636;
    --mono:"JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--mono);
    font-size:15px; line-height:1.7; min-height:100vh; -webkit-font-smoothing:antialiased;
    overflow-wrap:anywhere;
  }
  body::before{ content:""; position:fixed; inset:0; z-index:2; pointer-events:none;
    background:repeating-linear-gradient(180deg, rgba(212,175,55,.025) 0 1px, transparent 1px 3px); }
  body::after{ content:""; position:fixed; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%); }
  .term{position:relative; z-index:1; min-height:100vh; max-width:900px;
    margin:0 auto; padding:clamp(18px,4vh,48px) clamp(16px,4vw,40px) 28vh;}
  p{margin:0; white-space:pre-wrap;}
  .gold{color:var(--gold); text-shadow:0 0 8px rgba(212,175,55,.25);}
  .muted{color:var(--brass);}
  .dim{color:var(--dim);}
  .err{color:#c9683f;}
  .big{color:var(--gold); font-weight:700; letter-spacing:.18em;
    font-size:clamp(2.2rem,12vw,5rem); text-shadow:0 0 18px rgba(212,175,55,.3); margin:.1em 0 .2em;}
  .rule{color:var(--dim);}
  .prompt{color:var(--gold);}
  a{color:var(--gold); text-decoration:none; border-bottom:1px dotted rgba(212,175,55,.4);}
  a:hover,a:focus{text-shadow:0 0 8px rgba(212,175,55,.5); border-bottom-color:var(--gold);}
  .cur{display:inline-block; width:1ch; background:var(--gold); color:var(--bg);
    animation:blink 1.1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}
  @media (prefers-reduced-motion: reduce){ .cur{animation:none;} }
  </style>
</head>
<body>
  <main class="term">
    <p class="muted">matusiak.me · tty1</p>
    <p class="rule">──────────────────────────────────────────────</p>
    <p class="big">404</p>
    <p class="err">segmentation fault — path not found.</p>
    <p class="muted">you followed a pointer into unallocated memory.</p>
    <p class="muted">the strange loop has no such page.</p>
    <br />
    <p><span class="prompt">visitor@matusiak.me:~$</span> cd <a href="/">~</a><span class="cur">&nbsp;</span></p>
    <br />
    <p class="dim">core dumped. <a href="/">return to the prompt</a>.</p>
  </main>
</body>
</html>
